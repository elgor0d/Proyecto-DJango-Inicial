<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema UTSOE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: #0b2c4d;
            padding-top: 20px;
        }

        .sidebar h4 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar a {
            color: white;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #124b80;
        }

        .content {
            margin-left: 250px;
            padding: 30px;
        }

        .topbar {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.05);
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h4>UTSOE</h4>

    <a href="#"><i class="bi bi-speedometer2"></i> Dashboard</a>

    {% if request.user.is_superuser %}
        <a href="#"><i class="bi bi-people"></i> Gestión Usuarios</a>
        <a href="#"><i class="bi bi-gear"></i> Configuración</a>
    {% endif %}

    <a href="#"><i class="bi bi-journal-bookmark"></i> Materias</a>
    <a href="#"><i class="bi bi-bar-chart"></i> Reportes</a>
    <a href="{% url 'logout' %}"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
</div>

<div class="content">

    <div class="topbar d-flex justify-content-between">
        <div>
            Bienvenido, <strong>{{ request.user.username }}</strong>
        </div>
        <div>
            Rol:
            {% if request.user.is_superuser %}
                Administrador
            {% else %}
                Usuario
            {% endif %}
        </div>
    </div>

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
